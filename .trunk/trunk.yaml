# This file controls the behavior of Trunk: https://docs.trunk.io/cli
# To learn more about the format of this file, see https://docs.trunk.io/reference/trunk-yaml
version: 0.1
cli:
  version: 1.25.0
# Trunk provides extensibility via plugins. (https://docs.trunk.io/plugins)
plugins:
  sources:
    - id: trunk
      ref: v1.7.6
      uri: https://github.com/trunk-io/plugins
# Many linters and tools depend on runtimes - configure them here. (https://docs.trunk.io/runtimes)
runtimes:
  enabled:
    - node@22.16.0
    - python@3.10.8
# This is the section where you manage your linters. (https://docs.trunk.io/check/configuration)
lint:
  ignore:
    - linters: [checkov, git-diff-check, prettier]
      paths:
        - apps/web/public/data/**
    - linters: [prettier]
      paths:
        - integrations/raycast/raycast-env.d.ts
        # Author-submitted content (.mdx) is not prettier-governed — markdownlint
        # still covers it. This stops pre-existing content formatting from failing
        # the code `ci` lane (e.g. when a code PR's diff includes content changes)
        # without bulk-reformatting community submissions.
        - content/**
  enabled:
    - actionlint@1.7.12
    - checkov@3.2.525
    - git-diff-check
    - markdownlint@0.48.0
    - osv-scanner@2.3.5
    - oxipng@10.1.1
    - prettier@3.8.3
    - renovate@43.141.6
    - svgo@4.0.1
    - taplo@0.10.0
    - trufflehog@3.95.2
    - yamllint@1.38.0
actions:
  enabled:
    - trunk-announce
    - trunk-check-pre-push
    - trunk-fmt-pre-commit
    - trunk-upgrade-available
