name: Submission Issue Validation

on:
  issues:
    types:
      - opened
      - edited
      - reopened
      - labeled

permissions:
  contents: read
  issues: write

jobs:
  validate-submission:
    if: >-
      !github.event.issue.pull_request &&
      (
        contains(github.event.issue.labels.*.name, 'content-submission') ||
        startsWith(github.event.issue.title, 'Submit') ||
        startsWith(github.event.issue.title, '[Submit]') ||
        contains(github.event.issue.body, '### Category') ||
        contains(github.event.issue.body, '**Category:**') ||
        contains(github.event.issue.body, 'Category:') ||
        contains(github.event.issue.body, 'Content Type:')
      )
    runs-on: ubuntu-latest
    timeout-minutes: 5
    concurrency:
      group: submission-issue-${{ github.event.issue.number }}
      cancel-in-progress: true

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Setup pnpm
        uses: pnpm/action-setup@4f4305e1fe60ad818b8ae6fc4a697cc47eab0b2d

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version: 24.16.0
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Write issue payload
        uses: actions/github-script@373c709c69115d41ff229c7e5df9f8788daa9553
        with:
          script: |
            const fs = require("node:fs");
            fs.mkdirSync(".github/tmp", { recursive: true });
            fs.writeFileSync(
              ".github/tmp/issue.json",
              JSON.stringify(context.payload.issue, null, 2),
              "utf8"
            );

      - name: Write contributor payload
        uses: actions/github-script@373c709c69115d41ff229c7e5df9f8788daa9553
        with:
          script: |
            const fs = require("node:fs");
            const login = context.payload.issue.user?.login;
            if (!login) return;
            const { data: user } = await github.rest.users.getByUsername({
              username: login
            });
            fs.mkdirSync(".github/tmp", { recursive: true });
            fs.writeFileSync(
              ".github/tmp/contributor.json",
              JSON.stringify(user, null, 2),
              "utf8"
            );

      - name: Validate submission issue
        id: validate
        continue-on-error: true
        run: |
          node scripts/validate-submission-issue.mjs \
            --issue-json .github/tmp/issue.json \
            --output .github/tmp/submission-validation.json

      - name: Ensure validation report exists
        if: always()
        run: |
          test -f .github/tmp/submission-validation.json

      - name: Analyze submission risk
        if: always()
        run: |
          node scripts/analyze-submission-risk.mjs \
            --issue-json .github/tmp/issue.json \
            --validation-json .github/tmp/submission-validation.json \
            --contributor-json .github/tmp/contributor.json \
            --output .github/tmp/submission-risk.json \
            --markdown-output .github/tmp/submission-risk.md

      - name: Precheck auto-import eligibility
        id: auto_import_precheck
        if: always()
        run: |
          node scripts/ci/check-auto-import-eligibility.mjs \
            --issue-json .github/tmp/issue.json \
            --validation-json .github/tmp/submission-validation.json \
            --risk-json .github/tmp/submission-risk.json \
            --output .github/tmp/auto-import-precheck.json

      - name: HeyClaude Submission Bot sync labels
        if: always()
        uses: actions/github-script@373c709c69115d41ff229c7e5df9f8788daa9553
        env:
          AUTO_IMPORT_ELIGIBLE: ${{ steps.auto_import_precheck.outputs.eligible }}
        with:
          script: |
            const fs = require("node:fs");
            const validationPath = ".github/tmp/submission-validation.json";
            const riskPath = ".github/tmp/submission-risk.json";
            if (!fs.existsSync(validationPath)) return;
            const validationReport = JSON.parse(fs.readFileSync(validationPath, "utf8"));
            const riskReport = fs.existsSync(riskPath)
              ? JSON.parse(fs.readFileSync(riskPath, "utf8"))
              : {};
            const autoImportEligible = process.env.AUTO_IMPORT_ELIGIBLE === "true";

            const { data: issue } = await github.rest.issues.get({
              ...context.repo,
              issue_number: context.issue.number
            });
            const managedValidationLabels = new Set([
              "needs-author-input",
              "source-needs-verification",
              "stale-submission",
              "auto-import-eligible"
            ]);
            const riskLabelDefinitions = riskReport.labelDefinitions || {};
            const riskLabels = new Set(Object.keys(riskLabelDefinitions));

            async function ensureLabel(name, color, description) {
              try {
                const { data: existing } = await github.rest.issues.getLabel({
                  ...context.repo,
                  name
                });
                if (
                  existing.color !== color ||
                  (existing.description || "") !== description
                ) {
                  await github.rest.issues.updateLabel({
                    ...context.repo,
                    name,
                    color,
                    description
                  });
                }
              } catch (error) {
                if (error.status !== 404) throw error;
                await github.rest.issues.createLabel({
                  ...context.repo,
                  name,
                  color,
                  description
                });
              }
            }

            for (const [name, definition] of Object.entries(riskLabelDefinitions)) {
              await ensureLabel(name, definition.color, definition.description);
            }

            if (autoImportEligible) {
              await ensureLabel(
                "auto-import-eligible",
                "0e8a16",
                "Submission passed deterministic gates and awaits maintainer-approved import PR"
              );
            }

            const currentLabels = (issue.labels || [])
              .map((label) => typeof label === "string" ? label : label.name)
              .filter(Boolean);
            const labels = new Set(
              currentLabels.filter(
                (label) =>
                  !managedValidationLabels.has(label) && !riskLabels.has(label)
              )
            );
            const validationLabels = autoImportEligible
              ? ["auto-import-eligible"]
              : validationReport.recommendedLabels || [];
            for (const label of validationLabels) {
              if (label && !riskLabels.has(label)) labels.add(label);
            }
            for (const label of riskReport.recommendedLabels || []) {
              if (label) labels.add(label);
            }
            const nextLabels = [...labels].filter(Boolean).sort();
            const currentSortedLabels = [...new Set(currentLabels)].sort();
            if (JSON.stringify(currentSortedLabels) !== JSON.stringify(nextLabels)) {
              try {
                await github.rest.issues.setLabels({
                  ...context.repo,
                  issue_number: context.issue.number,
                  labels: nextLabels
                });
              } catch (error) {
                core.warning(`Could not apply submission labels: ${error.message}`);
              }
            }

      - name: Preview import output
        if: ${{ always() && steps.auto_import_precheck.outputs.eligible == 'true' }}
        run: |
          node - <<'NODE'
          const { spawnSync } = require("node:child_process");
          const fs = require("node:fs");
          const reportPath = ".github/tmp/submission-validation.json";
          if (!fs.existsSync(reportPath)) process.exit(0);
          const report = JSON.parse(fs.readFileSync(reportPath, "utf8"));
          if (!report.ok || report.skipped) process.exit(0);
          const result = spawnSync(
            process.execPath,
            [
              "scripts/import-submission-issue.mjs",
              "--issue-json",
              ".github/tmp/issue.json",
              "--dry-run"
            ],
            { encoding: "utf8" }
          );
          if (result.status !== 0) {
            fs.writeFileSync(
              ".github/tmp/submission-import-preview.md",
              `Import preview failed:\n\n${result.stderr || result.stdout}`,
              "utf8"
            );
            process.exit(0);
          }
          fs.writeFileSync(".github/tmp/submission-import-preview.md", result.stdout, "utf8");
          NODE

      - name: Post HeyClaude submission check comment
        if: always()
        uses: actions/github-script@373c709c69115d41ff229c7e5df9f8788daa9553
        with:
          script: |
            const fs = require("node:fs");
            const validationPath = ".github/tmp/submission-validation.json";
            if (!fs.existsSync(validationPath)) return;

            const report = JSON.parse(fs.readFileSync(validationPath, "utf8"));
            const riskJsonPath = ".github/tmp/submission-risk.json";
            const riskReport = fs.existsSync(riskJsonPath)
              ? JSON.parse(fs.readFileSync(riskJsonPath, "utf8"))
              : {};

            const marker = "<!-- heyclaude-submission-check -->";
            const escapeMarkdownOrMention = (value) =>
              String(value ?? "")
                .replace(/\r/g, "")
                .replace(/\n/g, " ")
                .slice(0, 4000)
                .replace(/\\/g, "\\\\")
                .replace(/`/g, "\\`")
                .replace(/([*_{}\[\]()#+\-.!|>])/g, "\\$1")
                .replace(/</g, "&lt;")
                .replace(/@/g, "&#64;");
            const escapeCodeBlock = (value) =>
              String(value ?? "")
                .replace(/\r/g, "")
                .replace(/```/g, "` ` `")
                .replace(/@/g, "&#64;");
            const policyDecision = riskReport.policyDecision || "maintainer_review";
            const heading = report.skipped
              ? "## HeyClaude submission check: needs more detail"
              : !report.ok
                ? "## HeyClaude submission check: failed"
                : policyDecision === "auto_import_eligible"
                  ? "## HeyClaude submission check: schema passed, import approval eligible"
                  : "## HeyClaude submission check: schema passed, maintainer review required";

            const lines = [
              marker,
              heading,
              "",
              `- Category: ${escapeMarkdownOrMention(report.category || "unknown")}`,
              report.errors?.length ? `- Errors: ${report.errors.length}` : "- Errors: 0",
              report.warnings?.length ? `- Warnings: ${report.warnings.length}` : "- Warnings: 0",
              `- Risk tier: ${escapeMarkdownOrMention(riskReport.riskTier || "unknown")}`,
              `- Policy decision: ${escapeMarkdownOrMention(policyDecision)}`
            ];

            if (report.errors?.length) {
              lines.push("", "### Errors");
              for (const error of report.errors) lines.push(`- ${escapeMarkdownOrMention(error)}`);
            }

            if (report.warnings?.length) {
              lines.push("", "### Warnings");
              for (const warning of report.warnings) lines.push(`- ${escapeMarkdownOrMention(warning)}`);
            }

            if (report.skipped) {
              lines.push(
                "",
                "### Next steps",
                "- This looks like a submission, but it did not resolve to a supported category/schema.",
                "- Please update the issue with the category-specific form fields or resubmit through the matching submission form."
              );
            }

            const previewPath = ".github/tmp/submission-import-preview.md";
            if (fs.existsSync(previewPath)) {
              const preview = fs.readFileSync(previewPath, "utf8").trim();
              const [firstLine, ...rest] = preview.split("\n");
              const importPath = firstLine?.replace(/^Would write\s+/, "").trim();
              if (importPath) {
                lines.push("", "### Import preview", `- Output path: ${escapeMarkdownOrMention(importPath)}`);
              } else {
                lines.push("", "### Import preview");
              }
              const mdxPreview = rest.join("\n").trim();
              if (mdxPreview) {
                const capped = escapeCodeBlock(mdxPreview.split("\n").slice(0, 120).join("\n"));
                lines.push("", "<details><summary>Dry-run MDX preview</summary>", "", "```mdx", capped, "```", "</details>");
              }
            }

            if (riskReport.reviewFlags?.length) {
              lines.push("", "### Security/safety signals");
              for (const flag of riskReport.reviewFlags) {
                lines.push(
                  `- ${escapeMarkdownOrMention(flag.severity || "info")} ${escapeMarkdownOrMention(flag.summary || flag.id)} (${escapeMarkdownOrMention(flag.id)})`
                );
              }
            }

            if (riskReport.classificationWarnings?.length) {
              lines.push("", "### Policy warnings");
              for (const warning of riskReport.classificationWarnings) {
                lines.push(
                  `- ${escapeMarkdownOrMention(warning.summary || warning.id)} (${escapeMarkdownOrMention(warning.id)})`
                );
              }
            }

            if (riskReport.requestChangesReasons?.length) {
              lines.push("", "### Blockers");
              for (const reason of riskReport.requestChangesReasons) {
                lines.push(`- ${escapeMarkdownOrMention(reason)}`);
              }
            }

            if (riskReport.humanReviewNotes?.length) {
              lines.push("", "### Maintainer notes");
              for (const note of riskReport.humanReviewNotes) {
                lines.push(`- ${escapeMarkdownOrMention(note)}`);
              }
            }

            const body = lines.join("\n");
            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100
            });

            const isWorkflowBotComment = (comment) =>
              comment.user?.type === "Bot" &&
              comment.user?.login === "github-actions[bot]" &&
              typeof comment.body === "string";
            const existing = comments.find(
              (comment) => isWorkflowBotComment(comment) && comment.body.includes(marker)
            );
            const oldMarkers = [
              "<!-- submission-validation-report -->",
              "<!-- submission-risk-report -->"
            ];

            if (existing) {
              if (existing.body !== body) {
                await github.rest.issues.updateComment({
                  owner,
                  repo,
                  comment_id: existing.id,
                  body
                });
              }
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body
              });
            }

            for (const comment of comments) {
              if (
                isWorkflowBotComment(comment) &&
                comment.id !== existing?.id &&
                oldMarkers.some((oldMarker) => comment.body.includes(oldMarker))
              ) {
                await github.rest.issues.deleteComment({
                  owner,
                  repo,
                  comment_id: comment.id
                });
              }
            }

      - name: Fail when submission risk is critical
        if: always()
        run: |
          node scripts/ci/fail-critical-risk-report.mjs .github/tmp/submission-risk.json

      - name: Summarize invalid submission issue
        if: always()
        run: |
          node scripts/ci/fail-invalid-submission-report.mjs --informational
